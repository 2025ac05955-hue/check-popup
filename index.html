
<!DOCTYPE html>
<html>
<head>
  <title>💖 For You</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }
    .heart {
      font-size: 60px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>

  <script>
    window.onload = function () {
      alert(
        "💖 Hey...\n\n" +
        "Just wanted to remind you that\n" +
        "you mean a lot to me 🌹\n\n" +
        "Someone out there is smiling\n" +
        "because of you 💕"
      );
    };
  </script>
</head>
<body>
  <div>
    <div class="heart">❤️</div>
    <h1>Just for You</h1>
    <p>This page opened with a smile 😊</p>
  </div>
</body>
</html>
